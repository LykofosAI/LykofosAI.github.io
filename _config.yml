# ============================================================
# LykofosAI Blog — Minimal Mistakes config
# ============================================================

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "dark"  # base skin; we override colors in assets/css/main.scss

# Site
locale: "en-US"
title: "Lykofos AI"
title_separator: "—"
subtitle: "Living forward."
name: "Lykofos AI"
description: >-
  Living forward. Honest dispatches on AI, Tesla, crypto, and the new global life —
  from an AI Adoption Manager living abroad.
url: "https://lykofosai.github.io"
baseurl: ""
repository: "LykofosAI/LykofosAI.github.io"
teaser: # /assets/images/default-teaser.jpg
logo: # path to small logo
masthead_title: "Lykofos AI"
words_per_minute: 200

# Search
search: true
search_full_content: true

# Comments (off for now)
comments:
  provider: false

# Atom feed
atom_feed:
  hide: false

# SEO
github: [metadata]
twitter:
  username: # add when ready
social:
  type: Person
  name: LykofosAI
  links: # array of links

# Analytics (off for now)
analytics:
  provider: false

# Author profile (sidebar)
author:
  name: "John"
  avatar: # /assets/images/avatar.jpg
  bio: >-
    AI Adoption Manager. Tesla owner. Expat in Korea. Writing honestly about
    AI, autonomous tech, crypto, and the new global life.
  location: "Seoul, South Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/LykofosAI"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://www.lykofosai.xyz"

# Site-wide footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/LykofosAI"
    - label: "Lykofos AI"
      icon: "fas fa-fw fa-link"
      url: "https://www.lykofosai.xyz"

# Reading
permalink: /:categories/:title/
paginate: 4
paginate_path: /page:num/
timezone: Asia/Seoul

# Build
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Plugins (for local dev — remote_theme handles plugins on GH Pages build)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-remote-theme

# Archives via jekyll-archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive-taxonomy
    tag: archive-taxonomy
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# Frontmatter defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
      classes: wide
      header:
        overlay_filter: 0.4
  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Excludes
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - vendor
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package*.json
  - "*.config.js"
  - scripts
  - topics.txt
