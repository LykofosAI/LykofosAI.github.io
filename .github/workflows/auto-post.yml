name: Auto Post Blog

on:
  schedule:
    # Mondays + Thursdays at 00:00 UTC = 9am Korea time
    - cron: '0 0 * * 1,4'
  workflow_dispatch:  # allows manual "Run" button

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add _posts/ topics.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto: new blog post"
            git push
          fi
