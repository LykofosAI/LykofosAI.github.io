name: Auto Post Blog

on:
  schedule:
    # Mondays + Thursdays at 00:00 UTC = 9am Korea time
    - cron: '0 0 * * *'
  workflow_dispatch:  # allows manual "Run" button

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # required to dispatch the Build and Deploy workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add _posts/ topics.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto: new blog post"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Build and Deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN-authored commits don't auto-trigger workflows.
          # Explicitly dispatch Build and Deploy here.
          gh workflow run "Build and Deploy" --ref main
          echo "Build and Deploy dispatched"
